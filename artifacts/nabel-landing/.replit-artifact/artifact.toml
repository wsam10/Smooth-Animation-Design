kind = "web"
previewPath = "/"
title = "NABEL Industrial Windows Factory"
version = "1.0.0"
id = "artifacts/nabel-landing"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20014
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/nabel-landing run dev"

[services.env]
PORT = "20014"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/nabel-landing", "run", "build"]
publicDir = "artifacts/nabel-landing/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
